name: Deploy Cloudflare Pages

# Production-grade pipeline:
# - PR / non-master branches → preview environment URL
# - push to master → production
# - workflow_dispatch → redeploy any ref (rollback helper)
# - GitHub Environments for secrets + deployment history

on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      reason:
        description: Why are you deploying / rolling back?
        required: false
        default: Manual deploy

concurrency:
  # One deploy per branch/PR; cancel stale PR previews
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HUSKY: "0"
  NEXT_TELEMETRY_DISABLED: "1"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  PAGES_PROJECT_NAME: portx

jobs:
  # ─────────────────────────────────────────────
  # Build once, reuse artifact for deploy jobs
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip draft PRs to save build minutes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build static site
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-${{ github.sha }}
          path: out
          retention-days: 14
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Preview — PRs + non-production branches
  # ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'preview') ||
      (github.event_name == 'push' && github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main')
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      statuses: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages-${{ github.sha }}
          path: out

      # No repo checkout / pnpm cache here — only the static `out/` artifact is needed.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Resolve branch name
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "commit_message=Preview PR #${{ github.event.pull_request.number }} (${{ github.sha }})" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF_NAME}"
            # Cloudflare branch names: alphanumeric + hyphens
            SAFE=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-28)
            echo "branch=$SAFE" >> "$GITHUB_OUTPUT"
            echo "commit_message=Preview ${BRANCH} (${{ github.sha }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          # Project may be served as portx-2za.pages.dev; still deploy by project name.
          OUTPUT=$(wrangler pages deploy out \
            --project-name="${PAGES_PROJECT_NAME}" \
            --branch="${{ steps.meta.outputs.branch }}" \
            --commit-dirty=true \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ steps.meta.outputs.commit_message }}" \
            2>&1)

          echo "$OUTPUT"

          # Parse deployment URL from wrangler output
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9.-]+\.pages\.dev' | tail -n1 || true)
          if [ -z "$URL" ]; then
            # Fallback alias pattern for branch previews
            URL="https://${{ steps.meta.outputs.branch }}.${PAGES_PROJECT_NAME}.pages.dev"
          fi

          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Preview deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ steps.meta.outputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '### ☁️ Cloudflare Pages preview',
              '',
              `| | |`,
              `| --- | --- |`,
              `| **Preview** | ${url} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Project** | \`${process.env.PAGES_PROJECT_NAME}\` |`,
              '',
              '_This preview updates on every push to this PR._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes('Cloudflare Pages preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────
  # Production — master/main only
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages-${{ github.sha }}
          path: out

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy production to Cloudflare Pages
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT=$(wrangler pages deploy out \
            --project-name="${PAGES_PROJECT_NAME}" \
            --branch=production \
            --commit-dirty=true \
            --commit-hash="${{ github.sha }}" \
            --commit-message="Production ${{ github.sha }}" \
            2>&1)

          echo "$OUTPUT"

          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9.-]+\.pages\.dev' | tail -n1 || true)
          if [ -z "$URL" ]; then
            URL="https://${PAGES_PROJECT_NAME}.pages.dev"
          fi

          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "### 🚀 Production deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Rollback:** Cloudflare Dashboard → Workers & Pages → ${PAGES_PROJECT_NAME} → Deployments → Rollback" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ inputs.reason }}" ]; then
            echo "- **Reason:** ${{ inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────
  # Notify failure
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [build, deploy-preview, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Write failure summary
        run: |
          echo "### ❌ Deploy pipeline failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the failed job logs above. Common fixes:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing \`CLOUDFLARE_API_TOKEN\` / \`CLOUDFLARE_ACCOUNT_ID\` secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages project \`${PAGES_PROJECT_NAME}\` not created yet" >> "$GITHUB_STEP_SUMMARY"
          echo "- Token missing **Cloudflare Pages — Edit** permission" >> "$GITHUB_STEP_SUMMARY"
